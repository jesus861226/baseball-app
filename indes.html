<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>김광림야구학교 취미반 보강수업 신청</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1b2a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="보강신청">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/subsets/Paperlogy-dynamic-subset.css" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --navy2: #1b2d42;
    --navy3: #243447;
    --red: #e63946;
    --red2: #c1121f;
    --gold: #f4a261;
    --cream: #f1f0eb;
    --white: #ffffff;
    --gray: #8d99ae;
    --green: #2dc653;
    --green-bg: #0d3320;
    --full-red: #e63946;
    --full-bg: #3a0d12;
    --card-border: rgba(244,162,97,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Paperlogy', sans-serif;
    background: var(--navy);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2d42 60%, #16213e 100%);
    border-bottom: 3px solid var(--red);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 32px rgba(230,57,70,0.18);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .logo-ball {
    width: 48px; height: 48px;
    background: radial-gradient(circle at 35% 35%, #fff 0%, #e8e8e8 60%, #ccc 100%);
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .logo-ball::before, .logo-ball::after {
    content: '';
    position: absolute;
    border: 2.5px solid var(--red);
    border-radius: 50%;
  }
  .logo-ball::before {
    width: 28px; height: 28px;
    top: -8px; left: 12px;
    transform: rotate(-30deg);
    clip-path: ellipse(14px 8px at 50% 50%);
    border-color: var(--red);
  }
  .logo-ball::after {
    width: 28px; height: 28px;
    bottom: -8px; right: 12px;
    transform: rotate(-30deg);
    clip-path: ellipse(14px 8px at 50% 50%);
  }

  .header-title h1 {
    font-family: 'Paperlogy', sans-serif;
    font-size: 1.35rem;
    color: var(--white);
    letter-spacing: 0.5px;
    line-height: 1.1;
    font-weight: 800;
  }
  .header-title span {
    font-family: 'Paperlogy', sans-serif;
    font-size: 0.92rem;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ─── DATE PICKER ─── */
  .date-section {
    max-width: 1100px;
    margin: 32px auto 0;
    padding: 0 20px;
  }

  .date-section label {
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    display: block;
    margin-bottom: 10px;
  }

  .date-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  input[type="date"] {
    background: var(--navy2);
    border: 1.5px solid var(--card-border);
    border-radius: 10px;
    color: var(--white);
    font-size: 1rem;
    font-family: 'Paperlogy', sans-serif;
    padding: 10px 18px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  input[type="date"]:focus { border-color: var(--gold); }

  .day-badge {
    background: var(--red);
    color: #fff;
    font-family: 'Paperlogy', sans-serif;
    font-size: 1rem;
    padding: 8px 18px;
    border-radius: 8px;
    display: none;
    letter-spacing: 2px;
  }

  /* ─── GRID ─── */
  .classes-grid {
    max-width: 1100px;
    margin: 28px auto 0;
    padding: 0 20px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 20px;
  }

  /* ─── CLASS CARD ─── */
  .class-card {
    background: linear-gradient(145deg, var(--navy2), var(--navy3));
    border: 1.5px solid var(--card-border);
    border-radius: 16px;
    padding: 24px;
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s both;
  }
  .class-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(230,57,70,0.13); }

  .class-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--gold), var(--red));
    border-radius: 4px 0 0 4px;
  }

  .class-card.full { border-color: rgba(230,57,70,0.35); }
  .class-card.full::before { background: var(--red); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .class-name {
    font-family: 'Paperlogy', sans-serif;
    font-size: 1.15rem;
    color: var(--white);
    letter-spacing: 1px;
  }

  .class-time {
    font-size: 0.78rem;
    color: var(--gray);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .status-pill {
    padding: 5px 13px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .status-pill.open { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
  .status-pill.full { background: var(--full-bg); color: var(--full-red); border: 1px solid var(--full-red); }

  /* ─── SLOTS ─── */
  .slots-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .slot {
    flex: 1;
    height: 36px;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 500;
    transition: all 0.2s;
    overflow: hidden;
    padding: 0 4px;
  }
  .slot.taken {
    background: rgba(244,162,97,0.1);
    border-color: rgba(244,162,97,0.35);
    color: var(--gold);
    font-size: 0.68rem;
  }
  .slot.empty {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.2);
  }
  .slot.empty::after { content: '빈 자리'; font-size: 0.65rem; }

  .count-text {
    font-size: 0.78rem;
    color: var(--gray);
    margin-bottom: 14px;
  }
  .count-text strong { color: var(--gold); }

  /* ─── REGISTER FORM ─── */
  .reg-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .name-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Paperlogy', sans-serif;
    font-size: 0.9rem;
    padding: 9px 14px;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .name-input:focus { border-color: var(--gold); }
  .name-input::placeholder { color: rgba(255,255,255,0.25); }
  .name-input:disabled { opacity: 0.4; cursor: not-allowed; }

  .reg-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--red), var(--red2));
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Paperlogy', sans-serif;
    font-size: 0.95rem;
    padding: 11px 16px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .reg-btn:hover:not(:disabled) { opacity: 0.88; transform: scale(0.98); }
  .reg-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .full-msg {
    text-align: center;
    color: var(--full-red);
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 10px 0 2px;
  }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy2);
    border: 1.5px solid var(--gold);
    border-radius: 12px;
    padding: 14px 28px;
    color: var(--cream);
    font-size: 0.92rem;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.35s cubic-bezier(.21,1.2,.5,1), opacity 0.3s;
    opacity: 0;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.error { border-color: var(--red); }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--navy2);
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 36px 32px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.25s cubic-bezier(.21,1.2,.5,1);
  }
  .modal-overlay.show .modal { transform: scale(1); }

  .modal-icon { font-size: 3rem; margin-bottom: 16px; }
  .modal h2 { font-family: 'Paperlogy', sans-serif; font-size: 1.3rem; margin-bottom: 12px; color: var(--gold); }
  .modal p { font-size: 0.92rem; color: var(--gray); line-height: 1.7; margin-bottom: 24px; }
  .modal p strong { color: var(--white); }

  .modal-close {
    background: linear-gradient(135deg, var(--red), var(--red2));
    border: none; border-radius: 10px;
    color: #fff; font-family: 'Paperlogy', sans-serif;
    font-size: 1rem; padding: 12px 32px;
    cursor: pointer; letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .modal-close:hover { opacity: 0.85; }

  /* ─── LOADING ─── */
  .loading-screen {
    position: fixed; inset: 0;
    background: var(--navy);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    transition: opacity 0.4s;
  }
  .loading-screen.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(244,162,97,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { color: var(--gray); font-size: 0.88rem; letter-spacing: 2px; }

  /* ─── NOTICE ─── */
  .notice-bar {
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px 20px 0;
    font-size: 0.8rem;
    color: var(--gray);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .notice-bar span { color: var(--gold); font-weight: 700; }

  /* ─── ADMIN SECTION ─── */
  .admin-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 16px;
    display: flex;
    justify-content: flex-end;
  }
  .admin-link {
    color: var(--gray);
    font-size: 0.75rem;
    text-decoration: none;
    letter-spacing: 1px;
    border-bottom: 1px dashed var(--gray);
    transition: color 0.2s;
    cursor: pointer;
  }
  .admin-link:hover { color: var(--gold); border-color: var(--gold); }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .class-card:nth-child(1) { animation-delay: 0.05s; }
  .class-card:nth-child(2) { animation-delay: 0.10s; }
  .class-card:nth-child(3) { animation-delay: 0.15s; }
  .class-card:nth-child(4) { animation-delay: 0.20s; }
  .class-card:nth-child(5) { animation-delay: 0.25s; }
  .class-card:nth-child(6) { animation-delay: 0.30s; }
  .class-card:nth-child(7) { animation-delay: 0.35s; }
  .class-card:nth-child(8) { animation-delay: 0.40s; }
  .class-card:nth-child(9) { animation-delay: 0.45s; }

  /* ─── CONFIG MODAL ─── */
  .config-modal {
    background: var(--navy2);
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 480px;
    width: 90%;
    transform: scale(0.9);
    transition: transform 0.25s cubic-bezier(.21,1.2,.5,1);
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-overlay.show .config-modal { transform: scale(1); }

  .config-modal h2 {
    font-family: 'Paperlogy', sans-serif;
    font-size: 1.2rem;
    color: var(--gold);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .config-subtitle { font-size: 0.78rem; color: var(--gray); margin-bottom: 20px; }

  .config-input-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    gap: 12px;
  }
  .config-input-row:last-of-type { border-bottom: none; }

  .config-label { font-size: 0.85rem; color: var(--cream); flex: 1; }
  .config-label small { display: block; font-size: 0.7rem; color: var(--gray); }

  .config-num {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Paperlogy', sans-serif;
    font-size: 0.9rem;
    padding: 6px 10px;
    width: 60px;
    text-align: center;
    outline: none;
  }
  .config-num:focus { border-color: var(--gold); }

  .config-save-btn {
    width: 100%;
    margin-top: 20px;
    background: linear-gradient(135deg, var(--red), var(--red2));
    border: none; border-radius: 10px;
    color: #fff; font-family: 'Paperlogy', sans-serif;
    font-size: 1rem; padding: 13px;
    cursor: pointer; letter-spacing: 2px;
    transition: opacity 0.2s;
  }
  .config-save-btn:hover { opacity: 0.85; }

  .config-cancel-btn {
    width: 100%;
    margin-top: 10px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
    color: var(--gray); font-family: 'Paperlogy', sans-serif;
    font-size: 0.88rem; padding: 11px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .config-cancel-btn:hover { border-color: var(--gray); }

  /* ─── OFFLINE MODE BANNER ─── */
  .offline-banner {
    background: rgba(230,57,70,0.12);
    border: 1px solid rgba(230,57,70,0.3);
    border-radius: 10px;
    padding: 10px 16px;
    margin: 0 20px 16px;
    font-size: 0.8rem;
    color: #f08080;
    display: none;
    max-width: 1100px;
    margin: 0 auto 10px;
  }

  @media (max-width: 600px) {
    .header-title h1 { font-size: 1.15rem; }
    .classes-grid { grid-template-columns: 1fr; }
  }

  /* ─── STEP UI ─── */
  .step2-section { margin-top: 24px; }

  .step2-inner {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .selected-class-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(244,162,97,0.1);
    border: 1.5px solid rgba(244,162,97,0.35);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.9rem;
    color: var(--gold);
    font-weight: 600;
    width: fit-content;
  }

  .selected-class-badge .change-btn {
    font-size: 0.72rem;
    color: var(--gray);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 3px 9px;
    cursor: pointer;
    transition: color 0.2s;
    font-family: 'Paperlogy', sans-serif;
  }
  .selected-class-badge .change-btn:hover { color: var(--white); }

  .date-hint {
    font-size: 0.77rem;
    color: var(--gray);
    padding: 2px 0;
    min-height: 18px;
  }
  .date-hint.warn { color: #f4a261; }
  .date-hint.ok { color: var(--green); }

  /* ─── CLASS SELECT GRID ─── */
  .class-select-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .class-select-btn {
    background: linear-gradient(145deg, var(--navy2), var(--navy3));
    border: 1.5px solid var(--card-border);
    border-radius: 14px;
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.18s, transform 0.15s, box-shadow 0.18s;
    text-align: left;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s both;
  }
  .class-select-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--gold), var(--red));
    border-radius: 4px 0 0 4px;
  }
  .class-select-btn:hover {
    border-color: rgba(244,162,97,0.5);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(244,162,97,0.12);
  }
  .class-select-btn.active {
    border-color: var(--gold);
    background: linear-gradient(145deg, #2a2000, #1e1800);
    box-shadow: 0 0 0 2px rgba(244,162,97,0.25);
  }
  .class-select-btn .btn-day {
    font-family: 'Paperlogy', sans-serif;
    font-size: 1.05rem;
    color: var(--white);
    letter-spacing: 1px;
  }
  .class-select-btn .btn-name {
    font-size: 0.78rem;
    color: var(--gray);
    margin-top: 3px;
  }
  .class-select-btn .btn-time {
    font-size: 0.72rem;
    color: rgba(244,162,97,0.7);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }
  .class-select-btn .check-icon {
    position: absolute;
    top: 12px; right: 12px;
    width: 20px; height: 20px;
    background: var(--gold);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: var(--navy);
    font-weight: 900;
  }
  .class-select-btn.active .check-icon { display: flex; }

  /* ─── SELECTED CLASS TAG & SAME-DAY INFO ─── */
  .my-class-tag {
    display: inline-block;
    background: linear-gradient(90deg, var(--gold), #e08c40);
    color: var(--navy);
    font-size: 0.68rem;
    font-weight: 900;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .class-card.selected-class {
    border-color: rgba(244,162,97,0.5);
    box-shadow: 0 0 0 2px rgba(244,162,97,0.15);
  }

  .same-day-info {
    grid-column: 1 / -1;
    font-size: 0.78rem;
    color: var(--gray);
    padding: 6px 4px 2px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text">보강 현황 불러오는 중...</div>
</div>

<!-- Header -->
<header>
  <div class="header-inner">
    <div class="logo-ball"></div>
    <div class="header-title">
      <h1>김광림야구학교 취미반</h1>
      <span>보강수업 신청 페이지</span>
    </div>
  </div>
</header>

<!-- Offline Banner -->
<div class="offline-banner" id="offlineBanner">
  ⚠ 데모 모드로 동작 중입니다. Google Apps Script URL 설정 후 실제 데이터와 연동됩니다.
</div>

<!-- Step 1: 날짜 선택 -->
<div class="date-section">
  <label>① 보강 받을 날짜 선택</label>
  <div class="step2-inner">
    <div class="date-row">
      <input type="date" id="datePicker">
      <div class="day-badge" id="dayBadge"></div>
    </div>
    <div class="date-hint" id="dateHint"></div>
  </div>
</div>

<!-- Step 2: 수업 반 선택 -->
<div class="date-section" style="margin-top:24px;">
  <label>② 보강 신청할 수업반 선택</label>
  <div class="class-select-grid" id="classSelectGrid">
    <!-- Rendered by JS -->
  </div>
</div>

<!-- Notice -->
<div class="notice-bar" id="noticeBar" style="display:none;">
  <span>⚾</span> 각 반 최대 3명 선착순 · 이름 입력 후 신청 버튼 클릭
</div>

<!-- Classes Grid -->
<div class="classes-grid" id="classesGrid" style="display:none;">
  <!-- Rendered by JS -->
</div>

<!-- Admin Link -->
<div class="admin-section">
  <span class="admin-link" onclick="openAdminConfig()">⚙ 관리자: 보강 인원 설정</span>
</div>

<!-- Success Modal -->
<div class="modal-overlay" id="successModal">
  <div class="modal">
    <div class="modal-icon">⚾</div>
    <h2 id="modalTitle">신청 완료!</h2>
    <p id="modalBody"></p>
    <button class="modal-close" onclick="closeModal('successModal')">확인</button>
  </div>
</div>

<!-- Admin Config Modal -->
<div class="modal-overlay" id="adminModal">
  <div class="config-modal">
    <h2>⚙ 보강 인원 설정</h2>
    <p class="config-subtitle">각 반의 최대 보강 인원을 설정하세요. (기본값: 3명)</p>
    <div id="configRows"></div>
    <button class="config-save-btn" onclick="saveConfig()">저장</button>
    <button class="config-cancel-btn" onclick="closeModal('adminModal')">취소</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ============================================================
// 설정 - Google Apps Script 웹앱 URL을 여기에 입력하세요
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWumCkr7g06mqQoAH9R7BDeFtHyWlA0vv7L8c6n8dr6TPxtPNRDSU1pSZFnQeL9th0/exec';

const CLASS_LIST = [
  { id: 'mon',        name: '월요반',            time: '17:30~19:00', day: '월', dayIndex: 1 },
  { id: 'tue',        name: '화요반',            time: '17:30~19:00', day: '화', dayIndex: 2 },
  { id: 'wed',        name: '수요반',            time: '17:30~19:00', day: '수', dayIndex: 3 },
  { id: 'thu',        name: '목요반',            time: '17:30~19:00', day: '목', dayIndex: 4 },
  { id: 'fri',        name: '금요반',            time: '18:40~20:10', day: '금', dayIndex: 5 },
  { id: 'sat_junior', name: '토요 주니어 중등반',  time: '10:00~12:00', day: '토', dayIndex: 6 },
  { id: 'sat_low',    name: '토요일 저학년반',    time: '13:30~15:00', day: '토', dayIndex: 6 },
  { id: 'sat_high',   name: '토요일 고학년반',    time: '15:00~16:30', day: '토', dayIndex: 6 },
  { id: 'sun',        name: '일요반',            time: '15:30~17:30', day: '일', dayIndex: 0 },
];

const DAY_NAMES = ['일','월','화','수','목','금','토'];

// Local state
let localData = {};
let localCapacity = {};
CLASS_LIST.forEach(c => localCapacity[c.id] = 3);

let selectedDate = '';
let selectedClassId = null;
let isOnline = false;

// ============================================================
// 프리페치 캐시 (로딩 속도 개선)
// ============================================================
const prefetchCache = {}; // { 'YYYY-MM-DD': { data, timestamp } }
const CACHE_TTL = 30000;  // 30초 캐시 유효

async function prefetchStatus(date) {
  // 이미 캐시 있고 유효하면 스킵
  if (prefetchCache[date] && Date.now() - prefetchCache[date].timestamp < CACHE_TTL) return;
  try {
    const res = await apiGet('getStatus', { date });
    if (res.success) {
      prefetchCache[date] = { data: res.data, timestamp: Date.now() };
      res.data.forEach(c => { localCapacity[c.id] = c.maxCapacity; });
    }
  } catch(e) { /* 백그라운드 실패는 무시 */ }
}

function prefetchNearDates(baseDate) {
  // 오늘 포함 앞뒤 7일 미리 로드
  const base = new Date(baseDate + 'T00:00:00');
  for (let i = 0; i <= 7; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    const str = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    setTimeout(() => prefetchStatus(str), i * 300); // 300ms 간격으로 분산 요청
  }
}

// ============================================================
// 날짜 유틸
// ============================================================
function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDayIndex(dateStr) {
  return new Date(dateStr + 'T00:00:00').getDay(); // 0=일 ~ 6=토
}

function getDayName(dateStr) {
  return DAY_NAMES[getDayIndex(dateStr)];
}

// 선택된 반의 요일과 날짜의 요일이 맞는지 확인
function isMatchingDay(dateStr, classId) {
  const cls = CLASS_LIST.find(c => c.id === classId);
  if (!cls) return false;
  return getDayIndex(dateStr) === cls.dayIndex;
}

// 선택 반의 요일로부터 가장 가까운 미래 날짜 찾기
function getNearestDate(classId) {
  const cls = CLASS_LIST.find(c => c.id === classId);
  if (!cls) return getTodayStr();
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayDay = today.getDay();
  let diff = cls.dayIndex - todayDay;
  if (diff < 0) diff += 7;
  if (diff === 0) diff = 7; // 오늘이 같은 요일이면 다음주로
  const target = new Date(today);
  target.setDate(today.getDate() + diff);
  return `${target.getFullYear()}-${String(target.getMonth()+1).padStart(2,'0')}-${String(target.getDate()).padStart(2,'0')}`;
}

// ============================================================
// API 호출
// ============================================================
async function apiGet(action, params = {}) {
  const query = new URLSearchParams({ action, ...params }).toString();
  const url = `${APPS_SCRIPT_URL}?${query}`;
  const res = await fetch(url);
  return await res.json();
}

// ============================================================
// STEP 1: 반 선택 버튼 렌더링
// ============================================================
function renderClassSelectGrid() {
  const grid = document.getElementById('classSelectGrid');
  grid.innerHTML = CLASS_LIST.map((cls, i) => `
    <button class="class-select-btn ${selectedClassId === cls.id ? 'active' : ''}"
            onclick="selectClass('${cls.id}')"
            style="animation-delay:${i*0.05}s">
      <div class="check-icon">✓</div>
      <div class="btn-day">${cls.day}요일 · ${cls.name}</div>
      <div class="btn-name">${cls.name}</div>
      <div class="btn-time">⏰ ${cls.time}</div>
    </button>
  `).join('');
}

// ============================================================
// STEP 1 → STEP 2: 반 선택 처리
// ============================================================
function selectClass(classId) {
  selectedClassId = classId;

  // Step2 버튼 active 처리
  document.querySelectorAll('.class-select-btn').forEach(btn => btn.classList.remove('active'));
  event.currentTarget.classList.add('active');

  // 날짜 힌트 업데이트
  updateDateHint(selectedDate, classId);

  // 결과 카드 영역 표시 후 로드
  document.getElementById('classesGrid').style.display = 'grid';
  document.getElementById('noticeBar').style.display = 'flex';
  loadStatus(selectedDate, classId);

  // 결과로 스크롤
  setTimeout(() => {
    document.getElementById('classesGrid').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function resetClassSelect() {
  selectedClassId = null;
  document.querySelectorAll('.class-select-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('classesGrid').style.display = 'none';
  document.getElementById('noticeBar').style.display = 'none';
  document.getElementById('dateHint').textContent = '';
  document.getElementById('dateHint').className = 'date-hint';
}

// ============================================================
// 날짜 힌트 업데이트
// ============================================================
function updateDayBadge(dateStr) {
  if (!dateStr) return;
  const badge = document.getElementById('dayBadge');
  badge.textContent = getDayName(dateStr) + '요일';
  badge.style.display = 'block';
}

function updateDateHint(dateStr, classId) {
  const hint = document.getElementById('dateHint');
  if (!dateStr || !classId) { hint.textContent = ''; return; }
  const cls = CLASS_LIST.find(c => c.id === classId);
  if (isMatchingDay(dateStr, classId)) {
    hint.textContent = `✅ ${getDayName(dateStr)}요일 — ${cls.name} 수업일과 일치합니다.`;
    hint.className = 'date-hint ok';
  } else {
    hint.textContent = `⚠ 선택한 날짜(${getDayName(dateStr)}요일)는 ${cls.name}(${cls.day}요일) 수업일이 아닙니다. 보강 신청은 가능하지만 확인하세요.`;
    hint.className = 'date-hint warn';
  }
}

// ============================================================
// 현황 로드
// ============================================================
async function loadStatus(date, classId) {
  showLoading(true);
  let allClasses;

  if (APPS_SCRIPT_URL !== 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
    try {
      // ✅ 캐시 확인 먼저 (프리페치된 데이터 있으면 즉시 사용)
      const cached = prefetchCache[date];
      if (cached && Date.now() - cached.timestamp < CACHE_TTL) {
        allClasses = cached.data;
        allClasses.forEach(c => { localCapacity[c.id] = c.maxCapacity; });
        isOnline = true;
        document.getElementById('offlineBanner').style.display = 'none';
      } else {
        // 캐시 없으면 서버 요청
        const res = await apiGet('getStatus', { date });
        if (res.success) {
          allClasses = res.data;
          allClasses.forEach(c => { localCapacity[c.id] = c.maxCapacity; });
          prefetchCache[date] = { data: res.data, timestamp: Date.now() };
          isOnline = true;
          document.getElementById('offlineBanner').style.display = 'none';
        } else throw new Error(res.message);
      }
    } catch(e) {
      isOnline = false;
      allClasses = buildLocalStatus(date);
      document.getElementById('offlineBanner').style.display = 'block';
    }
  } else {
    isOnline = false;
    allClasses = buildLocalStatus(date);
    document.getElementById('offlineBanner').style.display = 'block';
  }

  // 선택된 반만 필터 (같은 요일의 반들도 함께 표시)
  const cls = CLASS_LIST.find(c => c.id === classId);
  const filtered = cls
    ? allClasses.filter(c => c.id === classId || CLASS_LIST.find(x => x.id === c.id)?.dayIndex === cls.dayIndex)
    : allClasses;

  renderClasses(filtered, date, classId);
  showLoading(false);
}

function buildLocalStatus(date) {
  return CLASS_LIST.map(c => {
    const key = `${c.id}|${date}`;
    const students = localData[key] || [];
    const max = localCapacity[c.id] || 3;
    return {
      id: c.id, name: c.name, time: c.time, day: c.day,
      maxCapacity: max, currentCount: students.length,
      available: max - students.length,
      isFull: students.length >= max,
      students: [...students]
    };
  });
}

// ============================================================
// 클래스 카드 렌더링
// ============================================================
function renderClasses(classes, date, activeClassId) {
  const grid = document.getElementById('classesGrid');
  grid.innerHTML = '';

  classes.forEach((cls, i) => {
    const isSelected = cls.id === activeClassId;
    const card = document.createElement('div');
    card.className = `class-card ${cls.isFull ? 'full' : ''} ${isSelected ? 'selected-class' : ''}`;
    card.style.animationDelay = `${i * 0.07}s`;

    let slotsHtml = '';
    for (let s = 0; s < cls.maxCapacity; s++) {
      if (s < cls.students.length) {
        const name = cls.students[s] || '';
        const display = name.length > 5 ? name.slice(0,4)+'…' : name;
        slotsHtml += `<div class="slot taken" title="${name}">${display}</div>`;
      } else {
        slotsHtml += `<div class="slot empty"></div>`;
      }
    }

    const statusHtml = cls.isFull
      ? `<div class="status-pill full">마감</div>`
      : `<div class="status-pill open">신청가능 ${cls.available}석</div>`;

    const inputHtml = cls.isFull
      ? `<div class="full-msg">🔴 보강 자리가 모두 찼습니다</div>`
      : `<div class="reg-form">
           <input type="text" class="name-input" id="name_${cls.id}" placeholder="학생 이름 입력" maxlength="10">
           <button class="reg-btn" onclick="doRegister('${cls.id}','${date}')">신청</button>
         </div>`;

    const selectedMark = isSelected ? `<div class="my-class-tag">보강 신청할 수업반</div>` : '';

    card.innerHTML = `
      ${selectedMark}
      <div class="card-top">
        <div>
          <div class="class-name">${cls.name}</div>
          <div class="class-time">⏰ ${cls.time}</div>
        </div>
        ${statusHtml}
      </div>
      <div class="slots-row">${slotsHtml}</div>
      <div class="count-text"><strong>${cls.currentCount}</strong> / ${cls.maxCapacity}명 신청됨</div>
      ${inputHtml}
    `;
    grid.appendChild(card);
  });

  // 같은 요일 반이 여러 개일 때 안내
  if (classes.length > 1) {
    const infoEl = document.createElement('div');
    infoEl.className = 'same-day-info';
    infoEl.innerHTML = `💡 같은 요일의 다른 반도 함께 표시됩니다.`;
    grid.insertBefore(infoEl, grid.firstChild);
  }
}

// ============================================================
// 보강 신청
// ============================================================
async function doRegister(classId, date) {
  const input = document.getElementById(`name_${classId}`);
  const studentName = input.value.trim();
  if (!studentName) { showToast('학생 이름을 입력해주세요.', true); input.focus(); return; }
  if (!date) { showToast('날짜를 먼저 선택해주세요.', true); return; }

  input.disabled = true;
  let result;

  if (isOnline) {
    try { result = await apiGet('register', { classId, studentName, date }); }
    catch(e) { result = { success: false, message: '서버 연결 실패. 잠시 후 다시 시도하세요.' }; }
  } else {
    const key = `${classId}|${date}`;
    const students = localData[key] || [];
    const max = localCapacity[classId] || 3;
    if (students.length >= max) {
      result = { success: false, message: '보강 자리가 모두 찼습니다.' };
    } else if (students.includes(studentName)) {
      result = { success: false, message: '이미 신청된 학생입니다.' };
    } else {
      if (!localData[key]) localData[key] = [];
      localData[key].push(studentName);
      const cls = CLASS_LIST.find(c => c.id === classId);
      result = { success: true, data: { className: cls.name, studentName, date, time: cls.time } };
    }
  }

  input.disabled = false;
  input.value = '';

  if (result.success) {
    const d = result.data;
    // 캐시 무효화 (신청 후 최신 데이터 반영)
    delete prefetchCache[date];
    document.getElementById('modalTitle').textContent = '신청 완료! ⚾';
    document.getElementById('modalBody').innerHTML =
      `<strong>${d.studentName}</strong> 학생의<br><strong>${d.className}</strong> 보강 신청이 완료되었습니다.<br><br>📅 날짜: ${d.date}<br>⏰ 시간: ${d.time}`;
    openModal('successModal');
    await loadStatus(date, selectedClassId);
  } else {
    showToast(result.message, true);
  }
}

// ============================================================
// 관리자 설정
// ============================================================
async function openAdminConfig() {
  const rows = document.getElementById('configRows');
  // 로딩 표시
  rows.innerHTML = `<div style="text-align:center;padding:20px;color:var(--gold)">⏳ 서버에서 설정 불러오는 중...</div>`;
  openModal('adminModal');

  try {
    const res = await apiGet('getCapacity');
    if (res.success) {
      // 서버 값으로 localCapacity 동기화
      Object.assign(localCapacity, res.data);
    }
  } catch(e) { /* 실패시 로컬값 사용 */ }

  rows.innerHTML = CLASS_LIST.map(c => `
    <div class="config-input-row">
      <div class="config-label">${c.name}<small>${c.time}</small></div>
      <input type="number" class="config-num" id="cap_${c.id}" value="${localCapacity[c.id] || 3}" min="1" max="20">
    </div>
  `).join('');
}

async function saveConfig() {
  const capacityMap = {};
  CLASS_LIST.forEach(c => {
    const val = parseInt(document.getElementById(`cap_${c.id}`).value);
    capacityMap[c.id] = isNaN(val) || val < 1 ? 3 : val;
    localCapacity[c.id] = capacityMap[c.id];
  });

  // 저장 버튼 비활성화
  const saveBtn = document.querySelector('.config-save-btn');
  saveBtn.textContent = '저장 중...';
  saveBtn.disabled = true;

  try {
    const res = await apiGet('updateCapacity', { capacityMap: JSON.stringify(capacityMap) });
    closeModal('adminModal');
    showToast(res.success ? '✅ 설정이 서버에 저장되었습니다.' : '⚠️ 저장 실패: ' + res.message, !res.success);
  } catch(e) {
    closeModal('adminModal');
    showToast('⚠️ 서버 저장 실패. 로컬에만 적용됩니다.', true);
  } finally {
    saveBtn.textContent = '저장';
    saveBtn.disabled = false;
  }

  if (selectedDate && selectedClassId) await loadStatus(selectedDate, selectedClassId);
}

// ============================================================
// UI Helpers
// ============================================================
function showLoading(v) {
  const el = document.getElementById('loadingScreen');
  if (v) el.classList.remove('hidden');
  else setTimeout(() => el.classList.add('hidden'), 300);
}
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

let toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 3200);
}

// ============================================================
// 초기화
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  renderClassSelectGrid();

  // 날짜를 오늘로 초기 설정
  const dp = document.getElementById('datePicker');
  const today = getTodayStr();
  dp.value = today;
  selectedDate = today;
  updateDayBadge(today);
  showLoading(false);

  // ✅ 페이지 로드 즉시 백그라운드 프리페치 시작 (워밍업 + 데이터 미리 로드)
  if (APPS_SCRIPT_URL !== 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
    setTimeout(() => prefetchNearDates(today), 500);
  }

  // 날짜 변경 이벤트
  dp.addEventListener('change', async () => {
    selectedDate = dp.value;
    updateDayBadge(selectedDate);
    updateDateHint(selectedDate, selectedClassId);
    // ✅ 날짜 변경 시 주변 날짜도 미리 프리페치
    prefetchNearDates(selectedDate);
    if (selectedClassId) await loadStatus(selectedDate, selectedClassId);
  });

  // 모달 바깥 클릭으로 닫기
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('show');
    });
  });
});
</script>
